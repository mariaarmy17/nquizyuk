);

<!-- CONTENT -->

<div class="wrapper">

  <!-- LEFT COLUMN -->
  <div class="left-column">

    <div class="status-row">
      <div class="status-card">
        <div class="small">Posisi</div>
        <div class="round" id="posisiDisplay">-</div>
      </div>
      <div class="status-card">
        <div class="small">Waktu</div>
        <div class="timer-card">⏱ <div class="time" id="questionTimer">00:12</div></div>
      </div>
      <div class="status-card">
        <div class="small">Skor</div>
        <div class="point" id="myScore">0</div>
      </div>
    </div>

    <div class="question-card">
      <div class="badge">SOAL</div>
      <div id="questionImageWrap" class="question-image" style="text-align:center; margin:20px 0;">
        <img id="questionImage" src="../../assets/LOGO TEBAK GAMBAR.png" alt="soal" style="max-width:100%;height:auto;border-radius:10px;" />
      </div>
      <div id="options" class="options-list"></div>
    </div>

  </div>

  <!-- RIGHT COLUMN: Leaderboard -->
  <div class="board" id="leaderboard">

    <div class="board-title">🏆 LEADERBOARD</div>

    <div id="leaderList">
      <div class="player"><span>Belum ada skor ditampilkan</span></div>
    </div>

    <button class="more">Lihat selengkapnya</button>

  </div>

</div>


<script>
// Load soal dari localStorage dengan mode-specific key
let daftarSoal = JSON.parse(localStorage.getItem("daftarSoal_tebakgambar")) || [];

const questionTimerEl = document.getElementById('questionTimer');
const myScoreEl = document.getElementById('myScore');
const optionsEl = document.getElementById('options');
const questionImage = document.getElementById('questionImage');
const leaderList = document.getElementById('leaderList');
const posisiDisplay = document.getElementById('posisiDisplay');

let current = 0;
let questionDuration = Number(localStorage.getItem('durasi')) || 12; // seconds
let timerId = null;
let timeLeft = questionDuration;

const userInfo = JSON.parse(sessionStorage.getItem('userInfo') || '{}');
const myName = userInfo.username || 'You';
const leaderboardMode = 'quiz_tebakgambar';
const roomCode = sessionStorage.getItem('currentRoomCode');
let leaderboard = [];
let currentScore = 0;

async function saveScoreToServer(score) {
  try {
    const response = await fetch('/api/scores', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        username: myName,
        mode: leaderboardMode,
        score,
        room_code: roomCode || null
      })
    });
    if (!response.ok) {
      const data = await response.json().catch(() => ({}));
      throw new Error(data.error || 'Gagal menyimpan skor');
    }
    await fetchLeaderboard();
  } catch (error) {
    console.error('Error menyimpan skor:', error);
  }
}

async function fetchLeaderboard() {
  try {
    const response = await fetch(`/api/leaderboard/${leaderboardMode}`);
    if (!response.ok) throw new Error('Gagal mengambil leaderboard');
    leaderboard = await response.json();
  } catch (error) {
    console.error('Error mengambil leaderboard:', error);
    leaderboard = [];
  }
  renderLeaderboard();
}

function renderLeaderboard(){
  const entries = Array.isArray(leaderboard)
    ? leaderboard.slice().sort((a,b)=>b.score-a.score)
    : Object.entries(leaderboard).sort((a,b)=>b[1]-a[1]).map(([name,score])=>({ username:name, score }));

  leaderList.innerHTML = entries.length
    ? entries.map((row,i)=>{
        const rank = i + 1;
        const highlight = row.username === myName ? ' style="font-weight:700; color:#fde68a;"' : '';
        return `<div class="player"${highlight}><span>${rank}. ${row.username}</span><span>${row.score}</span></div>`;
      }).join('')
    : '<div class="player"><span>Belum ada skor ditampilkan</span></div>';
}

function renderQuestion(){
  if(daftarSoal.length === 0) {
    optionsEl.innerHTML = '<div class="player"><span>Tidak ada soal tersedia</span></div>';
    return;
  }
  
  const q = daftarSoal[current];
  // Assume soal format: { soal, jawaban, benar, poin }
  posisiDisplay.textContent = (current + 1) + '/' + daftarSoal.length;
  optionsEl.innerHTML = '';
  
  (q.jawaban || []).forEach((c, idx) => {
    const btn = document.createElement('button');
    btn.className = 'option';
    btn.innerHTML = `<div class="circle">${String.fromCharCode(65 + idx)}</div> ${c}`;
    btn.onclick = () => selectAnswer(idx, btn, q);
    optionsEl.appendChild(btn);
  });
  
  // reset timer
  resetTimer();
}

function resetTimer(){
  clearInterval(timerId);
  timeLeft = questionDuration;
  questionTimerEl.textContent = '00:' + String(timeLeft).padStart(2,'0');
  timerId = setInterval(()=>{
    timeLeft--;
    questionTimerEl.textContent = '00:' + String(timeLeft).padStart(2,'0');
    if(timeLeft<=0){
      clearInterval(timerId);
      autoNext();
    }
  },1000);
}

function selectAnswer(idx, btn, q){
  // disable buttons
  document.querySelectorAll('.option').forEach(b=>b.disabled=true);
  const correct = Number(q.benar);
  if(idx === correct){
    currentScore += Number(q.poin || 10);
    myScoreEl.textContent = currentScore;
    btn.style.background = '#10B981';
    saveScoreToServer(currentScore);
  } else {
    btn.style.background = '#FF6B6B';
    // highlight correct
    const all = document.querySelectorAll('.option');
    all[correct].style.background = '#10B981';
  }
  renderLeaderboard();
  // auto next after short delay
  clearInterval(timerId);
  setTimeout(()=>{ nextQuestion(); }, 1200);
}

function autoNext(){
  // mark unanswered as incorrect, then next
  const q = daftarSoal[current];
  const correct = Number(q.benar);
  document.querySelectorAll('.option').forEach((b, i)=>{
    b.disabled = true;
    if(i===correct) b.style.background = '#10B981';
  });
  setTimeout(()=>{ nextQuestion(); }, 900);
}

function nextQuestion(){
  current++;
  if(current >= daftarSoal.length){
    // end quiz - show summary or back to dashboard
    alert('Kuis selesai. Skor Anda: ' + currentScore);
    window.location.href='../../index.html';
    return;
  }
  renderQuestion();
}

(async function initQuiz() {
  if(daftarSoal.length === 0) {
    alert('Tidak ada soal untuk quiz ini. Silakan buat soal terlebih dahulu.');
    window.location.href = '../../index.html';
    return;
  }
  currentScore = 0;
  myScoreEl.textContent = currentScore;
  await fetchLeaderboard();
  renderLeaderboard();
  renderQuestion();
})();

</script>
